services:
  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config/sonarr:/config
      - /mnt/1tb-hdd/server/:/1tb-hdd
#      - /mnt/wd-black/server/:/wdBlack
      - /mnt/18tb-exo/:/18tb-exos
      - /mnt/18tb-exo/download:/downloads
    networks:
      - sonarr
      - arr
      - download
      - signal-cli
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=sonarr"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${HOST}`)"
      - "traefik.http.routers.sonarr.service=sonarr"
      - "traefik.http.routers.sonarr.entrypoints=https"
      - "traefik.http.routers.sonarr.tls=true"
      - "traefik.http.routers.sonarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
      - "homepage.group=Sourcers"
      - "homepage.name=Sonarr"
      - "homepage.icon=sonarr.png"
      - "homepage.href=https://sonarr.${HOST}"
      - "homepage.description=Series management"
      - "homepage.widget.type=sonarr"
      - "homepage.widget.url=http://sonarr:8989"
      - "homepage.widget.key=${SONARR_API_KEY}"
      - "homepage.widget.enableQueue=true"

networks:
  sonarr:
    external: true
  arr:
    external: true
  download:
    external: true
  signal-cli:
    external: true
