services:  
  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config/radarr:/config
      - /mnt/1tb-hdd/server/:/1tb-hdd
#      - /mnt/wd-black/:/wd-black
      - /mnt/18tb-exo/:/18tb-exos
      - /mnt/18tb-exo/download:/downloads
    networks:
      - radarr
      - arr
      - download
      - signal-cli
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=radarr"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${HOST}`)"
      - "traefik.http.routers.radarr.service=radarr"
      - "traefik.http.routers.radarr.entrypoints=https"
      - "traefik.http.routers.radarr.tls=true"
      - "traefik.http.routers.radarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
      - "homepage.group=Sourcers"
      - "homepage.name=Radarr"
      - "homepage.icon=radarr.png"
      - "homepage.href=https://radarr.${HOST}"
      - "homepage.description=Movie management"
      - "homepage.widget.type=radarr"
      - "homepage.widget.url=http://radarr:7878"
      - "homepage.widget.key=${RADARR_API_KEY}"
      - "homepage.widget.enableQueue=true"

networks:
  radarr:
    external: true
  arr:
    external: true
  download:
    external: true
  signal-cli:
    external: true
