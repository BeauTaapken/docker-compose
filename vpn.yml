services:
  vpn:
    container_name: vpn
    image: dperson/openvpn-client:latest
    restart: always
    volumes:
      - ./config/vpn:/vpn
      - /dev/net:/dev/net:z
    cap_add:
      - net_admin
    devices:
      - /dev/net/tun
    read_only: true
    tmpfs:
      - /run
      - /tmp
    security_opt:
      - label:disable
    stdin_open: true
    environment:
      - FIREWALL=""
    labels:
      - "wud.watch.digest=true"
