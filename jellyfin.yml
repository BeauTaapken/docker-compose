services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PGID}
      - PGID=${PUID}
      - TZ=${TZ}
      - DOCKER_MODS=ghcr.io/intro-skipper/intro-skipper-docker-mod
    volumes:
      - ./config/jellyfin:/config
      - ./cache:/cache
      - /mnt/1tb-hdd/server:/1tb-hdd
      - /mnt/wd-black/server:/wd-black
      - /mnt/18tb-exo:/18tb-exo
    restart: unless-stopped
    group_add:
      - "989"
    devices:
      - /dev/dri:/dev/dri
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${HOST}`)"
      - "traefik.http.routers.jellyfin.service=jellyfin"
      - "traefik.http.routers.jellyfin.entrypoints=https"
      - "traefik.http.routers.jellyfin.tls=true"
      - "traefik.http.routers.jellyfin.tls.certresolver=letsencrypt"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
      - "homepage.group=Media"
      - "homepage.name=Jellyfin"
      - "homepage.icon=jellyfin.png"
      - "homepage.href=https://jellyfin.${HOST}"
      - "homepage.description=Jellyfin"
      - "homepage.widget.type=jellyfin"
      - "homepage.widget.url=http://jellyfin:8096"
      - "homepage.widget.key=${JELLYFIN_API_KEY}"
      - "homepage.widget.enableBlocks=true"
      - "homepage.widget.enableMediaControl=false"
