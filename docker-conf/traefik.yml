global:
  checkNewVersion: true
  sendAnonymousUsage: false

api:
  dashboard: true

ping: {}

entryPoints:
  http:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: https
          scheme: https
  https:
    address: ":443"
    http:
      middlewares:
        - crowdsec@file
  minecraft:
    address: ":25565"

certificatesResolvers:
  letsencrypt:
    acme:
      email: beau@lioncode.nl
      storage: "/letsencrypt/acme.json"
      caServer: "https://acme-v02.api.letsencrypt.org/directory"
      httpChallenge:
        entryPoint: http
#      dnsChallenge:
#        provider: mijnhost
#        delayBeforeCheck: 0

providers:
  docker:
    network: proxy
  file:
    directory: /etc/traefik/dynamic/
    watch: true

log:
  level: INFO
  filePath: "/var/log/traefik/traefik.log"
  maxSize: 100
  maxBackups: 5
  maxAge: 30
  compress: true

accessLog:
  filePath: "/var/log/traefik/access.log"
  format: json

experimental:
  plugins:
    crowdsec-bouncer-traefik-plugin:
      moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
      version: "v1.5.1"
