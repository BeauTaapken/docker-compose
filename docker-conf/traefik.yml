global:
  checkNewVersion: true
  sendAnonymousUsage: false

api:
  dashboard: true

ping: {}

entryPoints:
  http:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: https
          scheme: https
  https:
    address: ":443"
  minecraft:
    address: ":25565"

certificatesResolvers:
  letsencrypt:
    acme:
      email: beau@lioncode.nl
      storage: "/letsencrypt/acme.json"
      caServer: "https://acme-v02.api.letsencrypt.org/directory"
      httpChallenge:
        entryPoint: http
#      dnsChallenge:
#        provider: mijnhost
#        delayBeforeCheck: 0

providers:
  docker:
    exposedByDefault: false
    network: proxy

# log:
