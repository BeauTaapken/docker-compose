http:
  middlewares:
    crowdsec:
      plugin:
        crowdsec-bouncer-traefik-plugin:
          Enabled: true
          LogLevel: "INFO"
          CrowdsecMode: "stream"
          CrowdsecLapiHost: "crowdsec:8080"
          CrowdsecLapiKey: '{{ env "CROWDSEC_LAPI_KEY" }}'
#          CrowdsecAppsecEnabled: false
          ClientTrustedIPs:
            - "127.0.0.1/32"
